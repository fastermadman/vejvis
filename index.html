<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E61919">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VEJ·VIS">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VEJ·VIS</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- prevent flash of wrong theme -->
<script>
(function(){
  var t = localStorage.getItem('vjtheme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<style>
/* fonts — place font files in /fonts/ alongside index.html */
@font-face {
  font-family: 'Gnomon';
  src: url('fonts/Gnomon-Heavy.woff2') format('woff2');
  font-weight: 900;
  font-display: swap;
}
@font-face {
  font-family: 'Drafting';
  src: url('fonts/Drafting-Regular.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}

/* reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── THEMES ─────────────────────────────────────────────────────────────── */
:root[data-theme="dark"] {
  --bg:        #121212;
  --surface:   #1C1C1C;
  --surface2:  #242424;
  --border:    #2A2A2A;
  --border-hi: #3C3C3C;
  --fg:        #EAEAEA;
  --fg-muted:  #6B6B6B;
  --accent:    #E61919;
  --status:    #4AF626;
  --tile-layer: dark_all;
}
:root[data-theme="light"] {
  --bg:        #F5F4F0;
  --surface:   #FFFFFF;
  --surface2:  #ECECEA;
  --border:    #D0CFC9;
  --border-hi: #AAAAAA;
  --fg:        #111111;
  --fg-muted:  #888888;
  --accent:    #C41010;
  --status:    #1A6B00;
  --tile-layer: light_all;
}

/* ── BASE ───────────────────────────────────────────────────────────────── */
html, body {
  font-family: 'Drafting', 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
  font-size: 13px;
  color: var(--fg);
  background: var(--bg);
  min-height: 100%;
  -webkit-text-size-adjust: 100%;
}

/* CRT scanlines — dark mode only */
[data-theme="dark"] body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.05) 2px,
    rgba(0,0,0,0.05) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.wordmark {
  font-family: 'Gnomon', 'Archivo Black', 'Inter', sans-serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.06em;
  color: var(--fg);
  line-height: 1;
}
.wordmark .dot { color: var(--accent); }
.header-sub {
  font-size: 9px;
  color: var(--fg-muted);
  margin-top: 3px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.header-controls { display: flex; align-items: center; gap: 6px; }

/* ── BUTTONS ─────────────────────────────────────────────────────────────── */
.btn {
  font-family: 'Drafting', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1px solid var(--border-hi);
  background: transparent;
  color: var(--fg-muted);
  cursor: pointer;
  -webkit-appearance: none;
  white-space: nowrap;
}
.btn:hover { border-color: var(--fg); color: var(--fg); }
.btn.active { border-color: var(--fg); color: var(--fg); background: var(--surface2); }

/* ── VEHICLE BAR ─────────────────────────────────────────────────────────── */
.vehicle-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.v-field { flex: 1; min-width: 130px; }
.v-field label {
  display: block;
  font-size: 9px;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 4px;
}
.v-field input {
  display: block;
  width: 100%;
  padding: 6px 8px;
  font-size: 14px;
  font-family: 'Drafting', monospace;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--fg);
  outline: none;
  -webkit-appearance: none;
}
.v-field input:focus { border-color: var(--fg); }

/* ── TABS ────────────────────────────────────────────────────────────────── */
.tabs-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 56px;
  z-index: 90;
  display: flex;
}
.tab-btn {
  flex: 1;
  padding: 10px 16px;
  font-size: 11px;
  font-family: 'Drafting', monospace;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--fg-muted);
  cursor: pointer;
  -webkit-appearance: none;
}
.tab-btn.active { color: var(--fg); border-bottom-color: var(--accent); }

/* ── PRESET ROW ──────────────────────────────────────────────────────────── */
.preset-section {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.preset-lbl {
  font-size: 9px;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 6px;
}
.preset-row { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-preset {
  padding: 4px 10px;
  font-size: 11px;
  font-family: 'Drafting', monospace;
  letter-spacing: 0.03em;
  border: 1px solid var(--border-hi);
  background: transparent;
  color: var(--fg-muted);
  cursor: pointer;
  -webkit-appearance: none;
  white-space: nowrap;
}
.btn-preset:hover { border-color: var(--fg); color: var(--fg); }

/* ── ROUTE LIST ──────────────────────────────────────────────────────────── */
.route-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

/* ── ROUTE CARD ──────────────────────────────────────────────────────────── */
.route-card {
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
}
.route-header {
  padding: 12px 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.route-card.open .route-header { border-bottom: 1px solid var(--border); }
.route-header-main { flex: 1; min-width: 0; cursor: pointer; }
.route-name {
  font-family: 'Drafting', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: none;
  background: transparent;
  color: var(--fg);
  width: 100%;
  outline: none;
  padding: 0;
  cursor: text;
}
.route-name:focus { color: var(--accent); }
.route-meta {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.route-cost-wrap { display: flex; align-items: baseline; gap: 2px; }
.route-cost-arrow { color: var(--accent); font-size: 12px; font-family: monospace; }
.route-cost {
  font-family: 'Drafting', monospace;
  font-size: 24px;
  color: var(--accent);
  letter-spacing: -0.01em;
  line-height: 1;
}
.route-cost-unit {
  font-size: 11px;
  color: var(--fg-muted);
  font-family: 'Drafting', monospace;
  margin-left: 1px;
}
.route-km {
  font-size: 11px;
  color: var(--fg-muted);
  font-family: 'Drafting', monospace;
}
.badge {
  font-size: 9px;
  font-family: 'Drafting', monospace;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  border: 1px solid var(--status);
  color: var(--status);
  white-space: nowrap;
}
.route-actions {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.btn-icon {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--fg-muted);
  font-size: 16px;
  line-height: 1;
  padding: 4px 6px;
  -webkit-appearance: none;
  font-family: monospace;
}
.btn-icon:hover { color: var(--accent); }
.chevron { font-size: 10px; color: var(--fg-muted); transition: transform .15s; }
.route-card.open .chevron { transform: rotate(180deg); }

/* ── ROUTE BODY ──────────────────────────────────────────────────────────── */
.route-body { display: none; }
.route-card.open .route-body { display: block; }

/* ── LEG LIST ────────────────────────────────────────────────────────────── */
.leg-list { list-style: none; }
.leg-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}
.leg-item:last-child { border-bottom: none; }
.leg-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  border: 1px solid var(--border-hi);
  color: var(--fg-muted);
}
.leg-icon.ferry, .leg-icon.bridge { color: var(--accent); border-color: var(--accent); }
.leg-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.leg-row { display: flex; gap: 6px; align-items: center; }
.leg-lbl {
  font-size: 9px;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  width: 28px;
  flex-shrink: 0;
}
.leg-inp {
  flex: 1;
  min-width: 0;
  padding: 4px 7px;
  font-size: 12px;
  font-family: 'Drafting', monospace;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--fg);
  outline: none;
  -webkit-appearance: none;
}
.leg-inp:focus { border-color: var(--fg); }
.leg-price { width: 80px; }
.leg-price-unit {
  font-size: 10px;
  color: var(--fg-muted);
  font-family: 'Drafting', monospace;
  flex-shrink: 0;
}
.leg-type-badge {
  font-size: 10px;
  font-family: 'Drafting', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 8px;
  border: 1px solid;
  cursor: pointer;
  -webkit-appearance: none;
  background: none;
  white-space: nowrap;
  flex-shrink: 0;
}
.leg-type-badge.drive  { color: var(--fg-muted); border-color: var(--border-hi); }
.leg-type-badge.ferry  { color: var(--accent); border-color: var(--accent); }
.leg-type-badge.bridge { color: var(--accent); border-color: var(--accent); }
.btn-leg-remove {
  background: none;
  border: none;
  color: var(--fg-muted);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  padding: 2px 4px;
  flex-shrink: 0;
  -webkit-appearance: none;
  margin-top: 2px;
  font-family: monospace;
}
.btn-leg-remove:hover { color: var(--accent); }
.leg-empty {
  padding: 14px 14px;
  font-size: 11px;
  color: var(--fg-muted);
  letter-spacing: 0.04em;
}

/* ── ADD LEG BAR ─────────────────────────────────────────────────────────── */
.add-leg-bar {
  padding: 8px 14px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}
.btn-add-leg {
  padding: 4px 10px;
  font-size: 10px;
  font-family: 'Drafting', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--border-hi);
  background: transparent;
  color: var(--fg-muted);
  cursor: pointer;
  -webkit-appearance: none;
  white-space: nowrap;
}
.btn-add-leg:hover { border-color: var(--fg); color: var(--fg); }

/* ── COST BREAKDOWN ──────────────────────────────────────────────────────── */
.route-breakdown {
  padding: 10px 14px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
}
.bd-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-family: 'Drafting', monospace;
  color: var(--fg-muted);
  padding: 2px 0;
  letter-spacing: 0.03em;
}
.bd-row.total {
  font-size: 12px;
  color: var(--fg);
  border-top: 1px solid var(--border-hi);
  margin-top: 4px;
  padding-top: 6px;
}

/* ── MAP ─────────────────────────────────────────────────────────────────── */
.route-map-wrap { border-top: 1px solid var(--border); }
.route-map { height: 200px; }
.map-status {
  padding: 5px 14px;
  font-size: 10px;
  font-family: 'Drafting', monospace;
  letter-spacing: 0.04em;
  color: var(--fg-muted);
  background: var(--surface2);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 14px;
  align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-line { width: 16px; height: 2px; }
.legend-line.drive  { background: var(--fg); }
.legend-line.ferry  { background: repeating-linear-gradient(90deg,var(--accent) 0,var(--accent) 4px,transparent 4px,transparent 8px); }
.legend-line.bridge { background: var(--accent); }
.map-status-text {
  flex: 1;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--status);
}

/* ── BOTTOM BAR ──────────────────────────────────────────────────────────── */
.bottom-bar { padding: 12px 16px 40px; }
.btn-primary {
  width: 100%;
  padding: 12px;
  font-size: 11px;
  font-family: 'Drafting', monospace;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border: 1px solid var(--fg);
  background: transparent;
  color: var(--fg);
  cursor: pointer;
  -webkit-appearance: none;
}
.btn-primary:hover { background: var(--fg); color: var(--bg); }

/* ── EMPTY STATE ─────────────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--fg-muted);
}
.empty-state-icon { font-size: 32px; margin-bottom: 14px; opacity: 0.25; }
.empty-state h3 {
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: 6px;
  font-family: 'Drafting', monospace;
}
.empty-state p {
  font-size: 11px;
  line-height: 1.6;
  letter-spacing: 0.03em;
  font-family: 'Drafting', monospace;
}
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="wordmark">VEJ<span class="dot">·</span>VIS</div>
    <div class="header-sub" id="app-subtitle"></div>
  </div>
  <div class="header-controls">
    <button class="btn" id="btn-theme" onclick="toggleTheme()"></button>
    <button class="btn" id="lang-en" onclick="setLang('en')">EN</button>
    <button class="btn" id="lang-da" onclick="setLang('da')">DA</button>
  </div>
</header>

<div class="vehicle-bar">
  <div class="v-field">
    <label id="lbl-cons"></label>
    <input type="number" id="f-cons" min="1" max="30" step="0.1"
           oninput="S.cons=+this.value; recalcAll(); updateAllHeaders()">
  </div>
  <div class="v-field">
    <label id="lbl-price"></label>
    <input type="number" id="f-price" min="1" max="50" step="0.5"
           oninput="S.price=+this.value; recalcAll(); updateAllHeaders()">
  </div>
</div>

<div class="tabs-wrap">
  <button class="tab-btn" id="tab-out" onclick="switchTab('out')"></button>
  <button class="tab-btn" id="tab-ret" onclick="switchTab('ret')"></button>
</div>

<div class="preset-section">
  <div class="preset-lbl" id="lbl-presets"></div>
  <div class="preset-row" id="preset-row"></div>
</div>

<div id="route-list" class="route-list"></div>

<div class="bottom-bar">
  <button class="btn-primary" id="btn-add-route" onclick="addRoute()"></button>
</div>

<script>
(function () {
'use strict';

// ── STATE ────────────────────────────────────────────────────────────────────
var S = {

function t(k) { return TR[S.lang][k] || k; }

// ── ICONS ─────────────────────────────────────────────────────────────────────
var SVG = {

  bridge: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="1" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="7" x2="1" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="13" y1="7" x2="13" y2="10" stroke="currentColor" stroke-width="1.2"/><path d="M1 7.5Q7 3 13 7.5" stroke="currentColor" stroke-width="1.2" fill="none"/><line x1="4" y1="8.5" x2="4" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="7" y1="6.5" x2="7" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="8.5" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>'
};

// ── PRESETS ───────────────────────────────────────────────────────────────────
var PRESETS = {
  dp: { name: 'D+ (4 ferries)', legs: [
    { type:'drive',  from:'Silkeborg',   fromLat:56.1684, fromLon:9.5733,  to:'Aarhus Havn',    toLat:56.158,  toLon:10.214  },
    { type:'ferry',  from:'Aarhus',      fromLat:56.158,  fromLon:10.214,  to:'Odden',           toLat:55.977,  toLon:11.301,  name:'Molslinjen Aarhus–Odden',     price:1198 },
    { type:'drive',  from:'Odden',       fromLat:55.977,  fromLon:11.301,  to:'Rørvig',          toLat:55.945,  toLon:11.767  },

// ── HELPERS ───────────────────────────────────────────────────────────────────
function uid() { return 'r' + (S.uid++); }
function fmt(n) { return Math.round(n).toLocaleString('da-DK'); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function routes() { return S[S.tab]; }
function routeById(id) {
  return S.out.concat(S.ret).find(function(r){ return r.id === id; });
}
function cloneLegs(legs) {
  return legs.map(function(l){ return Object.assign({}, l); });
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function tileUrl() {
  var theme = document.documentElement.getAttribute('data-theme');
  var layer = theme === 'dark' ? 'dark_all' : 'light_all';
  return 'https://{s}.basemaps.cartocdn.com/' + layer + '/{z}/{x}/{y}{r}.png';
}

function themeColors() {
  var theme = document.documentElement.getAttribute('data-theme');
  return theme === 'dark'
    ? { drive: '#EAEAEA', ferry: '#E61919', bridge: '#E61919', marker: '#E61919' }
    : { drive: '#333333', ferry: '#C41010', bridge: '#C41010', marker: '#C41010' };
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('vjtheme', theme);
  updateThemeBtn();
  // Update tile layers on active maps
  var url = tileUrl();
  Object.keys(S.maps).forEach(function(id) {
    if (S.maps[id] && S.maps[id]._tileLayer) {
      S.maps[id]._tileLayer.setUrl(url);
    }
  });
  // Redraw polylines with new colors
  Object.keys(S.maps).forEach(function(id) {
    var route = routeById(id);
    if (route && route.geo) drawFromGeo(id);
  });
}

function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme');
  setTheme(cur === 'dark' ? 'light' : 'dark');
}

function updateThemeBtn() {
  var theme = document.documentElement.getAttribute('data-theme');
  var btn = document.getElementById('btn-theme');
  if (btn) btn.textContent = theme === 'dark' ? t('theme_light') : t('theme_dark');
}

// ── RECALC ────────────────────────────────────────────────────────────────────
function recalcRoute(route) {
  var crossings = 0;
  route.legs.forEach(function(l) {
    if (l.type === 'ferry' || l.type === 'bridge') crossings += (parseFloat(l.price) || 0);
  });
  var fuel = route.km * S.cons / 100 * S.price;
  route.crossings = crossings;
  route.fuel = fuel;
  route.total = fuel + crossings;
}

function recalcAll() {
  S.out.concat(S.ret).forEach(recalcRoute);
}

function cheapestId(tab) {
  var list = S[tab].filter(function(r){ return r.total > 0; });
  if (list.length < 2) return null;
  var min = list.reduce(function(a, b){ return a.total < b.total ? a : b; });
  return min.id;
}

// ── GEOCODING ─────────────────────────────────────────────────────────────────
function geocode(name, cb) {
  var key = name.trim().toLowerCase();
  if (!key) { cb(null, null); return; }
  if (S.cache[key]) { cb(S.cache[key].lat, S.cache[key].lon); return; }
  fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(name) + '&format=json&limit=1')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d && d[0]) {
        var p = { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) };
        S.cache[key] = p; cb(p.lat, p.lon);
      } else cb(null, null);
    }).catch(function(){ cb(null, null); });
}

function geocodeLeg(leg, done) {
  var pending = 0;
  function fin() { if (--pending === 0 && done) done(); }
  if (leg.from && leg.fromLat == null) {
    pending++;
    geocode(leg.from, function(la, lo){ leg.fromLat = la; leg.fromLon = lo; fin(); });
  }
  if (leg.to && leg.toLat == null) {
    pending++;
    geocode(leg.to, function(la, lo){ leg.toLat = la; leg.toLon = lo; fin(); });
  }
  if (!pending && done) done();
}

// ── MAP ───────────────────────────────────────────────────────────────────────
function initMap(id) {
  var el = document.getElementById('map-' + id);
  if (!el) return;
  if (S.maps[id]) { try { S.maps[id].remove(); } catch(e){} }
  var m = L.map(el, { zoomControl: true }).setView([55.8, 11.5], 6);
  var tl = L.tileLayer(tileUrl(), {
    attribution: '&copy; <a href="https://www.openstreetmap.org">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(m);
  S.maps[id] = m;
  S.maps[id]._tileLayer = tl;
  S.maps[id]._drive   = L.layerGroup().addTo(m);
  S.maps[id]._ferry   = L.layerGroup().addTo(m);
  S.maps[id]._bridge  = L.layerGroup().addTo(m);
  S.maps[id]._markers = L.layerGroup().addTo(m);
}

function drawMarker(m, ll, name, big) {
  var sz = big ? 12 : 8;
  var col = themeColors().marker;
  var icon = L.divIcon({
    className: '',
    html: '<div style="width:'+sz+'px;height:'+sz+'px;background:'+col+';border:1.5px solid #fff;"></div>',
    iconSize: [sz,sz], iconAnchor: [Math.floor(sz/2), Math.floor(sz/2)]
  });
  L.marker(ll, {icon:icon}).bindTooltip(name||'', {direction:'top',offset:[0,-8]}).addTo(m._markers);
}

function drawFromGeo(id) {
  var route = routeById(id);
  var m = S.maps[id];
  if (!route || !m || !route.geo) return;
  m._drive.clearLayers(); m._ferry.clearLayers();
  m._bridge.clearLayers(); m._markers.clearLayers();
  var c = themeColors();
  var g = route.geo;
  var allCoords = [];
  g.driveSegs.forEach(function(seg) {
    L.polyline(seg, {color:c.drive, weight:3, opacity:.85}).addTo(m._drive);
    allCoords = allCoords.concat(seg);
  });
  g.ferrySegs.forEach(function(seg) {
    L.polyline(seg, {color:c.ferry, weight:2.5, dashArray:'7 5', opacity:.9}).addTo(m._ferry);
    allCoords = allCoords.concat(seg);
  });
  g.bridgeSegs.forEach(function(seg) {
    L.polyline(seg, {color:c.bridge, weight:3, opacity:.9}).addTo(m._bridge);
    allCoords = allCoords.concat(seg);
  });
  g.markers.forEach(function(mk) { drawMarker(m, mk.ll, mk.name, mk.big); });
  if (allCoords.length > 1) {
    m.fitBounds(L.latLngBounds(allCoords), {padding:[24,24]});
  }
  m.invalidateSize();
  setStatus(id, g.statusText);
}

function setStatus(id, msg) {
  var el = document.getElementById('mstatus-' + id);
  if (el) el.textContent = msg || '';
}

function scheduleUpdate(id) {
  clearTimeout(S.timers[id]);
  S.timers[id] = setTimeout(function(){ updateMapAsync(id); }, 400);
}

async function updateMapAsync(id) {
  var route = routeById(id);
  if (!route) return;
  setStatus(id, t('routing'));
  var driveSegs = [], ferrySegs = [], bridgeSegs = [], markers = [];
  var totalKm = 0;
  var legCount = route.legs.length;
  for (var i = 0; i < legCount; i++) {
    var leg = route.legs[i];
    if (!leg.fromLat || !leg.toLat) continue;
    var fll = [leg.fromLat, leg.fromLon];
    var tll = [leg.toLat,   leg.toLon];
    if (i === 0) markers.push({ll:fll, name:leg.from, big:true});
    markers.push({ll:tll, name:leg.to, big:(i===legCount-1)});
    if (leg.type === 'drive') {
      var cs = leg.fromLon+','+leg.fromLat+';'+leg.toLon+','+leg.toLat;
      try {
        var resp = await fetch('https://router.project-osrm.org/route/v1/driving/'+cs+'?overview=full&geometries=geojson');
        var data = await resp.json();
        if (data.routes && data.routes[0]) {
          totalKm += data.routes[0].distance / 1000;
          var geo = data.routes[0].geometry.coordinates.map(function(c){ return [c[1],c[0]]; });
          driveSegs.push(geo);
        }
      } catch(e) { driveSegs.push([fll, tll]); }
    } else if (leg.type === 'ferry') {
      ferrySegs.push([fll, tll]);
    } else if (leg.type === 'bridge') {
      bridgeSegs.push([fll, tll]);
    }
  }
  route.km = Math.round(totalKm);
  recalcRoute(route);
  var fc = route.legs.filter(function(l){ return l.type==='ferry'||l.type==='bridge'; }).length;
  route.geo = {
    driveSegs: driveSegs, ferrySegs: ferrySegs, bridgeSegs: bridgeSegs,
    markers: markers,
    statusText: (route.km>0 ? route.km+' km '+t('one_way') : '') +
                (fc>0 ? (route.km>0?' · ':'') + fc+' '+t('crossings') : '') || t('done')
  };
  drawFromGeo(id);
  updateRouteHeader(id);
}

function renderRoutes() {
  routes().forEach(function(r) {
    if (S.maps[r.id]) { try { S.maps[r.id].remove(); } catch(e){} delete S.maps[r.id]; }
  });
  var el = document.getElementById('route-list');
  if (!routes().length) {
    el.innerHTML = '<div class="empty-state">'
      + '<div class="empty-state-icon">+</div>'
      + '<h3>'+t('empty')+'</h3>'
      + '<p>'+t('empty_hint')+'</p>'
      + '</div>';
    return;
  }
  el.innerHTML = routes().map(routeCardHTML).join('');
  routes().forEach(function(r) {
    if (S.open[r.id]) {
      initMap(r.id);
      if (r.geo) drawFromGeo(r.id); else scheduleUpdate(r.id);
    }
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function addRoute() {
  var route = { id:uid(), name:t('new_route'), legs:[], km:0, total:0, fuel:0, crossings:0, geo:null };
  routes().push(route);
  S.open[route.id] = true;
  renderRoutes();
  var nameEl = document.querySelector('#card-'+route.id+' .route-name');
  if (nameEl) { nameEl.focus(); nameEl.select(); }
}

function deleteRoute(id) {
  var tab = S.tab;
  S[tab] = S[tab].filter(function(r){ return r.id !== id; });
  if (S.maps[id]) { try { S.maps[id].remove(); } catch(e){} delete S.maps[id]; }
  delete S.open[id];
  clearTimeout(S.timers[id]);
  renderRoutes();
}

function toggleRoute(id) {
  S.open[id] = !S.open[id];
  var card = document.getElementById('card-' + id);
  if (!card) return;
  if (S.open[id]) {
    card.classList.add('open');
    if (!S.maps[id]) {
      initMap(id);
      var route = routeById(id);
      if (route && route.geo) drawFromGeo(id); else scheduleUpdate(id);
    } else {
      S.maps[id].invalidateSize();
    }
  } else {
    card.classList.remove('open');
  }
}

function loadPreset(key) {
  var p = PRESETS[key];
  if (!p) return;
  var route = {
    id: uid(), name: p.name,
    legs: cloneLegs(p.legs),
    km: 0, total: 0, fuel: 0, crossings: 0, geo: null
  };
  recalcRoute(route);
  routes().push(route);
  S.open[route.id] = true;
  renderRoutes();
  scheduleUpdate(route.id);
}

function addLeg(routeId, type) {
  var route = routeById(routeId);
  if (!route) return;
  var leg = { type:type, from:'', fromLat:null, fromLon:null, to:'', toLat:null, toLon:null };
  if (type !== 'drive') { leg.name = ''; leg.price = 0; }
  route.legs.push(leg);
  renderLegList(routeId);
}

function removeLeg(routeId, idx) {
  var route = routeById(routeId);
  if (!route) return;
  route.legs.splice(idx, 1);
  route.geo = null;
  recalcRoute(route);
  renderLegList(routeId);
  updateRouteHeader(routeId);
  scheduleUpdate(routeId);
}

var LEG_CYCLE = { drive:'ferry', ferry:'bridge', bridge:'drive' };
function cycleLegType(routeId, idx) {
  var route = routeById(routeId);
  if (!route) return;
  var leg = route.legs[idx];
  leg.type = LEG_CYCLE[leg.type] || 'drive';
  if (leg.type !== 'drive' && leg.price == null) leg.price = 0;
  route.geo = null;
  renderLegList(routeId);
  scheduleUpdate(routeId);
}

function updateLegField(routeId, idx, field, val) {
  var route = routeById(routeId);
  if (!route) return;
  var leg = route.legs[idx];
  if (field === 'price') {
    leg.price = parseFloat(val) || 0;
    recalcRoute(route);
    updateRouteHeader(routeId);
    return;
  }
  if (field === 'name') { leg.name = val; return; }
  leg[field] = val;
  leg[field === 'from' ? 'fromLat' : 'toLat'] = null;
  leg[field === 'from' ? 'fromLon' : 'toLon'] = null;
  route.geo = null;
  geocodeLeg(leg, function() { scheduleUpdate(routeId); });
}

function setLang(lang) {
  S.lang = lang;
  localStorage.setItem('vjlang', lang);
  renderLabels();
  renderRoutes();
}

function switchTab(tab) {
  S.tab = tab;
  renderLabels();
  renderRoutes();
}

// ── EVENT DELEGATION ──────────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  var presetEl = e.target.closest('[data-preset]');
  if (presetEl) { loadPreset(presetEl.dataset.preset); return; }
  var actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  var action = actionEl.dataset.action;
  var rid    = actionEl.dataset.rid;
  var idx    = actionEl.dataset.idx !== undefined ? parseInt(actionEl.dataset.idx, 10) : -1;
  if (action === 'toggle')    { toggleRoute(rid); return; }
  if (action === 'rename')    { return; }
  if (action === 'delete')    { deleteRoute(rid); return; }
  if (action === 'cycle')     { cycleLegType(rid, idx); return; }
  if (action === 'addDrive')  { addLeg(rid, 'drive');  return; }
  if (action === 'addFerry')  { addLeg(rid, 'ferry');  return; }
  if (action === 'addBridge') { addLeg(rid, 'bridge'); return; }
  if (action === 'removeLeg') { removeLeg(rid, idx);   return; }
});

document.addEventListener('change', function(e) {
  var el = e.target;
  if (el.dataset.action === 'rename') {
    var route = routeById(el.dataset.rid);
    if (route) route.name = el.value;
    return;
  }
  var field = el.dataset.field;
  var rid   = el.dataset.rid;
  var idx   = el.dataset.idx !== undefined ? parseInt(el.dataset.idx, 10) : -1;
  if (field && rid && idx >= 0) updateLegField(rid, idx, field, el.value);
});

// expose to global for inline handlers
window.setLang     = setLang;
window.switchTab   = switchTab;
window.addRoute    = addRoute;
window.toggleTheme = toggleTheme;

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
  document.getElementById('f-cons').value  = S.cons;
  document.getElementById('f-price').value = S.price;
  renderLabels();
  loadPreset('dp');
})();

})();
</script>
</body>
</html>
